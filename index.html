<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Playball&display=swap" rel="stylesheet">
    
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: url("back.jpg");
            
        }

        .gallery { 
            position: relative; 
            width: 100%; 
            max-width: 900px;
            height: 500px; 
            margin-bottom: 30px;
        }

        /* Increased padding-bottom to fit the song bar */
        .photo { 
            background: white; 
            padding: 10px 10px 10px 10px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: absolute; 
            height: 300px;
            width: 230px;
            transition: all 0.4s ease;
            cursor: pointer;
            border: 1px solid #ddd;
            margin: bottom -20px;;
        }

        .photo img { width: 100%; height: 200px; object-fit: cover; }
        .photo p { margin: 10px 0 5px 0; text-align: center; font-family: 'Arial', sans-serif; color: #555; }

        /* Spotify Song Bar Styling */
        
        .p1 { transform: rotate(-8deg); left: 5%; top: 10%;margin-left: -150px; }
        .p2 { transform: rotate(5deg); left: 30%; top: 5%; margin-left: -70px;}
        .p3 { transform: rotate(-3deg); left: 55%; top: 15%;margin-left: -5px; }
        .p4 { transform: rotate(10deg); left: 80%; top: 10%; margin-left: 80px;}

        .photo:hover { transform: scale(1.1) rotate(0deg); z-index: 100; box-shadow: 0 15px 40px rgba(0,0,0,0.3); }

        .birthday-wish {
            font-family: 'Playball', cursive;
            font-size: 4rem;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 2px 2px 10px rgba(255,154,158,0.3);
            margin: 20px 0;
            margin-top: -100px;
        }

        .next-btn {
            padding: 12px 35px;
            background: #ff9a9e;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
        }
        /* Container for the spotify screenshot */
.spotify-screenshot {
    width: 100%;
    margin-top: 10px;
    border-radius: 4px;
    overflow: hidden;
    /* This ensures all screenshots are the same size */
    height: 60px; 
}

.spotify-screenshot img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* Keeps the image from stretching */
}
    </style>
</head>
<body>

    <div class="gallery">
        
        <div class="photo p1">
    <img src="aadi.jpeg" alt="Main Photo">
    <p>Day 1</p>
    
    <div class="spotify-screenshot">
        <img src="code1.jpeg" alt="Spotify Code">
    </div>
</div><div class="photo p2">
    <img src="aadi2.jpeg" alt="Main Photo">
    <p>Day 1</p>
    
    <div class="spotify-screenshot">
        <img src="code2.jpeg" alt="Spotify Code">
    </div>
</div><div class="photo p3">
    <img src="aadi3.jpeg" alt="Main Photo">
    <p>Day 1</p>
    
    <div class="spotify-screenshot">
        <img src="code3.jpeg" alt="Spotify Code">
    </div>
</div><div class="photo p4">
    <img src="aadi4.jpeg" alt="Main Photo">
    <p>Day 1</p>
    
    <div class="spotify-screenshot">
        <img src="code4.jpeg" alt="Spotify Code">
    </div>
</div>
    </div>

    <h1 class="birthday-wish">Happy Birthday, Aadi!</h1>
    <a href="3.html"><button class="next-btn">NEXT></button></a>

</body>
</html>
